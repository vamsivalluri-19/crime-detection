services:
  - type: web
    name: crime-detection-backend
    env: node
    plan: starter
    healthCheckPath: /api/health
    buildCommand: "npm install"
    startCommand: "npm start"
    # Set MONGO_URI and JWT_SECRET in the Render dashboard.
    # Do not commit secret values into this blueprint.

# Note: This is a simple Render manifest to help automated deployments from
# GitHub. Adjust `plan`, `env`, and other properties per your account.
